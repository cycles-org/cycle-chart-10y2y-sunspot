      margin: { t: 8, b: 40, l: 60, r: 60 },
      hovermode: 'x unified',
      hoverlabel: {
        bgcolor: 'rgba(12,12,22,0.95)',
        bordercolor: '#2a3050',
        font: { color: '#ddd', size: 12 }
      },

      // ── Grid rows: 65% top / 35% bottom ──
      grid: { rows: 2, columns: 1, pattern: 'independent', roworder: 'top to bottom' },

      xaxis:  {
        domain: [0, 1], anchor: 'y1',
        showgrid: true, gridcolor: '#1a1e30', gridwidth: 1,
        tickformat: '%Y', tickfont: { size: 10, color: '#556' },
        showline: false, zeroline: false
      },
      xaxis2: {
        domain: [0, 1], anchor: 'y3',
        showgrid: true, gridcolor: '#1a1e30', gridwidth: 1,
        tickformat: '%Y', tickfont: { size: 10, color: '#556' },
        showline: false, zeroline: false
      },

      yaxis: {
        domain: [0.38, 1], anchor: 'x1',
        title: { text: 'Spread', font: { color: '#4a9edd', size: 10 }, standoff: 4 },
        tickfont: { size: 10, color: '#4a9edd' },
        showgrid: true, gridcolor: '#1a1e30',
        zeroline: true, zerolinecolor: '#2a3550', zerolinewidth: 1,
        showline: false, ticklen: 0
      },
      yaxis2: {
        domain: [0.38, 1], anchor: 'x1', overlaying: 'y',
        side: 'right',
        title: { text: 'Composite', font: { color: '#cc9944', size: 10 }, standoff: 4 },
        tickfont: { size: 10, color: '#cc9944' },
        showgrid: false, zeroline: false, showline: false, ticklen: 0
      },
      yaxis3: {
        domain: [0, 0.32], anchor: 'x2',
        title: { text: 'Sunspot +3y', font: { color: '#cc6644', size: 10 }, standoff: 4 },
        tickfont: { size: 10, color: '#cc6644' },
        showgrid: true, gridcolor: '#1a1e30',
        zeroline: true, zerolinecolor: '#2a3550', zerolinewidth: 1,
        showline: false, ticklen: 0, rangemode: 'nonnegative'
      },

      legend: {
        bgcolor: 'rgba(0,0,0,0)', font: { size: 11, color: '#aaa' },
        x: 0.01, y: 0.98, orientation: 'h'
      },

      shapes: [
        { type: 'line', xref: 'paper', yref: 'y1', x0: 0, x1: 1, y0: 0, y1: 0,
          line: { color: '#2a3550', width: 1, dash: 'dot' } }
      ],

      annotations: [{
        xref: 'paper', yref: 'paper', x: 0.5, y: -0.06,
        text: 'Source: WDC-SILSO, Royal Observatory of Belgium · Drag to zoom · Double-click to reset',
        showarrow: false, font: { size: 9, color: '#334' }
      }]
    };

    var config = {
      responsive: true,
      displayModeBar: true,
      modeBarButtonsToRemove: ['select2d', 'lasso2d', 'autoScale2d'],
      toImageButtonOptions: { format: 'png', filename: 'cycle_chart', width: 1600, height: 900 }
    };

    Plotly.newPlot('chart', [trace1, trace2, trace3], layout, config);
  </script>
