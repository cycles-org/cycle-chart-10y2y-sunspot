  return MONTHS[parseInt(m,10)-1] + " " + y;
};
const fmtYear = s => s ? s.slice(0,4) : "";

function CustomTooltip({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  return React.createElement("div", {
    style: { background:"rgba(12,12,22,0.95)", border:"1px solid #2a3050",
      borderRadius:6, padding:"8px 14px", fontSize:12, color:"#ddd", lineHeight:1.8 }
  },
    React.createElement("div", { style:{ fontWeight:600, marginBottom:2, color:"#99aacc" } }, fmtDate(label)),
    payload.map((p, i) => p.value != null && React.createElement("div", { key:i, style:{ color:p.color } },
      p.name, ": ", React.createElement("strong", null,
        typeof p.value === "number" ? p.value.toFixed(p.name.startsWith("10Y") ? 3 : 1) : "—"
      )
    ))
  );
}

function CycleChart() {
  const [brush, setBrush] = React.useState({ startIndex:0, endIndex:DATA.length-1 });
  const visible = DATA.slice(brush.startIndex, brush.endIndex+1);
  const pad = (mn, mx, p=0.08) => { const r=mx-mn||1; return [+(mn-r*p).toFixed(2),+(mx+r*p).toFixed(2)]; };
  const vals  = visible.filter(d=>d.value!=null).map(d=>d.value);
  const comps = visible.filter(d=>d.composite!=null).map(d=>d.composite);
  const suns  = visible.flatMap(d=>[d.ss_actual,d.ss_proj].filter(v=>v!=null));
  const vDom  = vals.length  ? pad(Math.min(...vals),  Math.max(...vals))  : [-3,3];
  const cDom  = comps.length ? pad(Math.min(...comps), Math.max(...comps)) : [-35,35];
  const sDom  = suns.length  ? [0, +(Math.max(...suns)*1.08).toFixed(0)]  : [0,250];
  const ivl   = Math.floor(DATA.length / 14);

  return React.createElement("div", null,
    React.createElement("h2", { style:{ textAlign:"center", fontSize:13, letterSpacing:1, color:"#7799bb", marginBottom:8 } },
      "10Y\u20132Y SPREAD & COMPOSITE CYCLE [124 Month] \u00A0|\u00A0 SUNSPOT COUNT (+3yr shift, SC25 projection via spaceweatherlive)"
    ),

    /* ── TOP PANE ─────────────────────────────────────────────────────── */
    React.createElement(ResponsiveContainer, { width:"100%", height:320 },
      React.createElement(ComposedChart, { data:DATA, syncId:"main", margin:{ top:6,right:60,left:8,bottom:0 } },
        React.createElement(CartesianGrid, { strokeDasharray:"3 3", stroke:"#1a1e30" }),
        React.createElement(XAxis, { dataKey:"date", tickFormatter:fmtYear, interval:ivl,
          tick:{ fontSize:10, fill:"#445" }, tickLine:false }),
        React.createElement(YAxis, { yAxisId:"left", domain:vDom, tickCount:7,
          tick:{ fontSize:10, fill:"#4a9edd" }, tickLine:false,
          label:{ value:"Spread", angle:-90, position:"insideLeft", fill:"#4a9edd", fontSize:10, dx:-2 } }),
        React.createElement(YAxis, { yAxisId:"right", orientation:"right", domain:cDom, tickCount:7,
          tick:{ fontSize:10, fill:"#cc9944" }, tickLine:false,
          label:{ value:"Composite", angle:90, position:"insideRight", fill:"#cc9944", fontSize:10, dx:4 } }),
        React.createElement(Tooltip, { content: React.createElement(CustomTooltip,null) }),
        React.createElement(Legend, { wrapperStyle:{ fontSize:11, paddingTop:4 } }),
        React.createElement(ReferenceLine, { yAxisId:"left", y:0, stroke:"#2a3550", strokeDasharray:"4 3" }),
        React.createElement(Line, { yAxisId:"left", type:"monotone", dataKey:"value",
          name:"10Y-2Y Value", stroke:"#4a9edd", strokeWidth:1.4, dot:false, connectNulls:true, activeDot:{r:3} }),
        React.createElement(Line, { yAxisId:"right", type:"monotone", dataKey:"composite",
          name:"Composite Cycle", stroke:"#e8a020", strokeWidth:1.4, dot:false, connectNulls:true, activeDot:{r:3} })
      )
    ),

    /* ── BOTTOM PANE ──────────────────────────────────────────────────── */
    React.createElement(ResponsiveContainer, { width:"100%", height:230 },
      React.createElement(ComposedChart, { data:DATA, syncId:"main", margin:{ top:4,right:60,left:8,bottom:30 } },
        React.createElement(CartesianGrid, { strokeDasharray:"3 3", stroke:"#1a1e30" }),
        React.createElement(XAxis, { dataKey:"date", tickFormatter:fmtYear, interval:ivl,
          tick:{ fontSize:10, fill:"#445" }, tickLine:false }),
        React.createElement(YAxis, { yAxisId:"left", domain:sDom, tickCount:6,
          tick:{ fontSize:10, fill:"#f0c040" }, tickLine:false,
          label:{ value:"Sunspot +3yr", angle:-90, position:"insideLeft", fill:"#f0c040", fontSize:10, dx:-2 } }),
        React.createElement(YAxis, { yAxisId:"right", orientation:"right", domain:sDom, tickCount:6,
          tick:false, tickLine:false, axisLine:false, width:60 }),
        React.createElement(Tooltip, { content: React.createElement(CustomTooltip,null) }),
        React.createElement(Legend, { wrapperStyle:{ fontSize:11, paddingTop:4 } }),
        React.createElement(ReferenceLine, { yAxisId:"left", y:0, stroke:"#2a3550", strokeDasharray:"4 3" }),

        /* actual historical sunspot, shifted +3y */
        React.createElement(Line, { yAxisId:"left", type:"monotone", dataKey:"ss_actual",
          name:"Sunspot +3yr (actual)", stroke:"#f0c040", strokeWidth:1.4,
          dot:false, connectNulls:false, activeDot:{r:3} }),

        /* SC25 projection from spaceweatherlive, shifted +3y */
        React.createElement(Line, { yAxisId:"left", type:"monotone", dataKey:"ss_proj",
          name:"Sunspot +3yr (SC25 proj)", stroke:"#f0c040", strokeWidth:1.4, strokeDasharray:"5 3",
          dot:false, connectNulls:true, activeDot:{r:3} }),

        React.createElement(Brush, { dataKey:"date", height:24, travellerWidth:6,
          stroke:"#2a3050", fill:"#111", tickFormatter:fmtYear,
          onChange: r => r && r.startIndex!=null && setBrush(r),
          startIndex:brush.startIndex, endIndex:brush.endIndex })
      )
    ),

    React.createElement("div", { style:{ textAlign:"center", fontSize:12, color:"#aabbcc", marginTop:6 } },
      "Source: WDC-SILSO, Royal Observatory of Belgium \u00A0\xB7\u00A0 Projection: spaceweatherlive.com SC25 combined method, shifted +3yr \u00A0\xB7\u00A0 Drag brush to zoom", React.createElement("br",null), "Source/Idea by: Tom McClellan \u00A0|\u00A0 Plot & cycle analysis: Lars von Thienen"
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(CycleChart, null));

  </script>
</body>
</html>
